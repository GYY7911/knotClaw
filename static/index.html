<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Knotclaw - 对话归档工具</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <!-- 背景装饰 -->
    <div class="bg-decoration">
        <div class="bg-grid"></div>
        <div class="bg-glow bg-glow-1"></div>
        <div class="bg-glow bg-glow-2"></div>
        <div class="floating-shapes">
            <div class="shape shape-1"></div>
            <div class="shape shape-2"></div>
            <div class="shape shape-3"></div>
        </div>
    </div>

    <div class="app">
        <!-- 头部导航 -->
        <header class="header">
            <div class="logo">
                <div class="logo-icon">
                    <svg viewBox="0 0 32 32" fill="none">
                        <path d="M16 2L4 9v14l12 7 12-7V9L16 2z" stroke="currentColor" stroke-width="2" fill="none"/>
                        <circle cx="16" cy="16" r="5" fill="currentColor"/>
                        <path d="M16 11V6M16 26v-5M21 16h5M6 16h5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                </div>
                <span class="logo-text">Knotclaw</span>
            </div>
            <div class="header-actions">
                <button class="theme-toggle" onclick="toggleTheme()" title="切换主题">
                    <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="5"/>
                        <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
                    </svg>
                    <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                    </svg>
                </button>
            </div>
        </header>

        <!-- 主内容区 -->
        <main class="main">
            <!-- 英雄区域 -->
            <section class="hero" id="hero">
                <div class="hero-badge">
                    <span class="badge-dot"></span>
                    DeepSeek 对话归档工具
                </div>
                <h1 class="hero-title">
                    <span class="title-line">保存你的</span>
                    <span class="title-highlight">AI 对话</span>
                </h1>
                <p class="hero-desc">
                    轻松获取、选择、导出 DeepSeek 分享链接中的对话内容
                </p>

                <!-- 输入区域 -->
                <div class="input-area" id="inputArea">
                    <div class="input-wrapper">
                        <div class="input-icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
                                <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
                            </svg>
                        </div>
                        <input
                            type="text"
                            id="url"
                            placeholder="粘贴 DeepSeek 分享链接..."
                            autocomplete="off"
                            spellcheck="false"
                        >
                        <button class="fetch-btn" onclick="startFetch()" id="fetchBtn">
                            <span class="btn-text">获取对话</span>
                            <span class="btn-icon">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M5 12h14M12 5l7 7-7 7"/>
                                </svg>
                            </span>
                        </button>
                    </div>
                    <div class="input-hint">
                        <span>支持格式：</span>
                        <code>https://chat.deepseek.com/share/...</code>
                    </div>
                </div>

                <!-- 加载状态 -->
                <div class="loading-area" id="loadingArea" style="display: none;">
                    <div class="loading-animation">
                        <div class="loading-ring"></div>
                        <div class="loading-ring"></div>
                        <div class="loading-ring"></div>
                        <div class="loading-core">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                                <polyline points="7,10 12,15 17,10"/>
                                <line x1="12" y1="15" x2="12" y2="3"/>
                            </svg>
                        </div>
                    </div>
                    <div class="loading-text" id="loadingText">正在获取对话...</div>
                    <div class="loading-progress">
                        <div class="progress-bar" id="progressBar"></div>
                    </div>
                </div>
            </section>

            <!-- 错误提示 -->
            <div class="error-toast" id="error" style="display: none;">
                <div class="error-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"/>
                        <line x1="12" y1="8" x2="12" y2="12"/>
                        <line x1="12" y1="16" x2="12.01" y2="16"/>
                    </svg>
                </div>
                <span class="error-text" id="errorText"></span>
                <button class="error-close" onclick="hideError()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"/>
                        <line x1="6" y1="6" x2="18" y2="18"/>
                    </svg>
                </button>
            </div>

            <!-- 对话结果区 -->
            <section class="result-area" id="resultArea" style="display: none;">
                <!-- 结果头部 -->
                <div class="result-header">
                    <div class="result-stats">
                        <div class="stat-item">
                            <span class="stat-value" id="totalMessages">0</span>
                            <span class="stat-label">条对话</span>
                        </div>
                        <div class="stat-divider"></div>
                        <div class="stat-item">
                            <span class="stat-value" id="selectedCount">0</span>
                            <span class="stat-label">已选择</span>
                        </div>
                    </div>
                    <div class="result-actions">
                        <button class="action-btn secondary" onclick="toggleSelectAll()" id="selectAllBtn">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <rect x="3" y="3" width="18" height="18" rx="2"/>
                            </svg>
                            <span>全选</span>
                        </button>
                        <button class="action-btn secondary" onclick="clearSelection()">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
                            </svg>
                            <span>清除</span>
                        </button>
                    </div>
                </div>

                <!-- 对话列表 -->
                <div class="messages-container" id="messages"></div>

                <!-- 导出栏 -->
                <div class="export-bar" id="exportBar">
                    <div class="export-info">
                        <span class="export-count" id="exportCount">0</span>
                        <span>条对话将被导出</span>
                    </div>
                    <button class="export-btn" onclick="exportSelected()" id="exportBtn">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                            <polyline points="7,10 12,15 17,10"/>
                            <line x1="12" y1="15" x2="12" y2="3"/>
                        </svg>
                        <span>导出 Markdown</span>
                    </button>
                </div>
            </section>

            <!-- 导出成功 -->
            <div class="success-modal" id="successModal" style="display: none;">
                <div class="success-content">
                    <div class="success-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
                            <polyline points="22,4 12,14.01 9,11.01"/>
                        </svg>
                    </div>
                    <h3>导出成功</h3>
                    <p>文件已保存至：</p>
                    <code class="success-path" id="exportPath"></code>
                    <button class="success-close" onclick="closeSuccessModal()">完成</button>
                </div>
            </div>
        </main>

        <!-- 页脚 -->
        <footer class="footer">
            <p>由 <span class="highlight">Knotclaw</span> 驱动 · 让 AI 对话永存</p>
        </footer>
    </div>

    <script src="/js/app.js"></script>
</body>
</html>
